<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/driver-profile" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Informasi Akun</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding bg-gray-50">
  <ng-container *ngIf="user$ | async as user">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-4">
      <div class="flex justify-center mb-6">
        <div class="w-24 h-24 bg-primary/10 rounded-full flex items-center justify-center">
          <span class="material-symbols-outlined text-[48px] text-primary">person</span>
        </div>
      </div>

      <div class="space-y-4">
        <div>
          <label class="text-sm text-gray-500 font-medium">Nama Lengkap</label>
          <div class="text-base font-semibold mt-1">{{ user.name }}</div>
        </div>
        
        <div>
          <label class="text-sm text-gray-500 font-medium">Email</label>
          <div class="text-base font-semibold mt-1">{{ user.email }}</div>
        </div>

        <div>
          <label class="text-sm text-gray-500 font-medium">Nomor Telepon</label>
          <div class="text-base font-semibold mt-1">{{ user.phone || '-' }}</div>
        </div>

        <div>
          <label class="text-sm text-gray-500 font-medium">Role</label>
          <div class="text-base font-semibold mt-1 capitalize">{{ user.role }}</div>
        </div>
      </div>
    </div>
  </ng-container>
</ion-content>
