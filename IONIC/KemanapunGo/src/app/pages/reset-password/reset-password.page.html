<ion-content class="login-page reset-page">
  <div class="relative w-full min-h-screen bg-surface-container-lowest overflow-hidden flex flex-col">
    <div class="hero-section">
      <div class="hero-img-container">
        <div class="hero-img hero-art" aria-hidden="true"></div>
        <div class="hero-overlay"></div>
      </div>

      <div class="header-ui">
        <button class="back-btn" (click)="goBack()">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
      </div>

      <div class="logo-container">
        <img alt="KemanapunGo Logo" class="logo-img animate-float" src="assets/icon/favicon.png" />
      </div>
    </div>

    <div class="login-form-content glass-panel">
      <div class="text-center">
        <h1>Reset Kata Sandi</h1>
        <p>Masukkan token dari email dan kata sandi baru Anda.</p>
      </div>

      <form (submit)="submit($event)">
        <div class="input-group">
          <label>Token Reset</label>
          <div class="input-wrapper">
            <span class="material-symbols-outlined icon">key</span>
            <input class="custom-input" type="text" [(ngModel)]="form.token" name="token" placeholder="Masukkan Token Reset" autocomplete="off" required />
          </div>
        </div>

        <div class="input-group">
          <label>Email</label>
          <div class="input-wrapper">
            <span class="material-symbols-outlined icon">mail</span>
            <input class="custom-input" type="email" [(ngModel)]="form.email" name="email" placeholder="Masukkan Email" autocomplete="off" required />
          </div>
        </div>

        <div class="input-group">
          <label>Password Baru</label>
          <div class="input-wrapper">
            <span class="material-symbols-outlined icon">lock</span>
            <input class="custom-input" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="form.password" name="password" placeholder="Minimal 8 karakter" autocomplete="off" required />
            <button class="toggle-password" type="button" (click)="showPassword = !showPassword">
              <span class="material-symbols-outlined">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
        </div>

        <div class="input-group">
          <label>Konfirmasi Password</label>
          <div class="input-wrapper">
            <span class="material-symbols-outlined icon">verified_user</span>
            <input class="custom-input" [type]="showConfirmPassword ? 'text' : 'password'" [(ngModel)]="form.password_confirmation" name="password_confirmation" placeholder="Ulangi password baru" autocomplete="off" required />
            <button class="toggle-password" type="button" (click)="showConfirmPassword = !showConfirmPassword">
              <span class="material-symbols-outlined">{{ showConfirmPassword ? 'visibility_off' : 'visibility' }}</span>
            </button>
          </div>
        </div>

        <button type="submit" class="submit-btn w-full" [disabled]="isLoading" aria-label="Reset password">
          <span *ngIf="!isLoading">Reset Password</span>
          <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
        </button>
      </form>

      <div class="register-prompt">
        <p>Sudah ingat password? <a [routerLink]="['/login']">Kembali ke Masuk</a></p>
      </div>
    </div>
  </div>
</ion-content>
