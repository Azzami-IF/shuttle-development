<ion-content class="login-page forgot-page">
  <div class="relative w-full min-h-screen bg-surface-container-lowest overflow-hidden flex flex-col">
    <div class="hero-section">
      <div class="hero-img-container">
        <div class="hero-img hero-art" aria-hidden="true"></div>
        <div class="hero-overlay"></div>
      </div>

      <div class="header-ui">
        <button class="back-btn" (click)="goBack()">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
      </div>

      <div class="logo-container">
        <img alt="KemanapunGo Logo" class="logo-img animate-float" src="assets/icon/favicon.png" />
      </div>
    </div>

    <div class="login-form-content glass-panel">
      <div class="text-center">
        <h1>Lupa Kata Sandi</h1>
        <p>Masukkan email akun Anda. Kami akan mengirim link untuk mengatur ulang kata sandi.</p>
      </div>

      <form (submit)="submit($event)">
        <div class="input-group">
          <label>Email</label>
          <div class="input-wrapper">
            <span class="material-symbols-outlined icon">mail</span>
            <input
              class="custom-input"
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="Masukkan Email"
              autocomplete="off"
              required
            />
          </div>
        </div>

        <button type="submit" class="submit-btn w-full" [disabled]="isLoading" aria-label="Kirim link reset">
          <span *ngIf="!isLoading">Kirim Link Reset</span>
          <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
        </button>
      </form>
    </div>
  </div>
</ion-content>
